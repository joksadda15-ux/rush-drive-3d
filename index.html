here<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rush Drive 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
    body { overflow: hidden; background: #111; touch-action: none; }

    canvas { display: block; width: 100vw; height: 100vh; }

    /* Main Menu UI */
    #mainMenu {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    h1 { color: #fff; font-size: 40px; margin-bottom: 40px; text-shadow: 0 0 10px #ff9900; }

    .menu-btn {
      width: 200px; padding: 15px; margin: 10px;
      font-size: 20px; font-weight: bold;
      border: none; border-radius: 25px;
      cursor: pointer; color: white;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .menu-btn:active { transform: scale(0.9); }
    #playBtn { background: linear-gradient(45deg, #ff416c, #ff4b2b); box-shadow: 0 5px 15px rgba(255, 75, 43, 0.5); }
    #shopBtn { background: linear-gradient(45deg, #11998e, #38ef7d); box-shadow: 0 5px 15px rgba(56, 239, 125, 0.5); }
    #referBtn { background: linear-gradient(45deg, #4A00E0, #8E2DE2); box-shadow: 0 5px 15px rgba(142, 45, 226, 0.5); }

    /* Game Controls */
    .controls {
      position: fixed; bottom: 30px; width: 100%;
      display: none; /* Hidden in menu */
      justify-content: space-around;
      z-index: 10;
      padding: 0 20px;
    }

    .game-btn {
      width: 100px; height: 100px;
      font-size: 16px; font-weight: bold; border: none; border-radius: 50%;
      color: white; user-select: none;
      box-shadow: 0 8px 0px rgba(0,0,0,0.5);
      transition: all 0.1s;
    }
    .game-btn:active, .game-btn.active {
      transform: translateY(8px); box-shadow: 0 0px 0px rgba(0,0,0,0.5);
    }

    #gas { background: radial-gradient(circle, #00b09b, #96c93d); }
    #brake { background: radial-gradient(circle, #ed213a, #93291e); }

    /* UI Overlay */
    #ui {
      position: absolute; top: 10px; left: 10px; color: white;
      font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px black; display: none;
      z-index: 10;
    }
    .hp-bar-container { width: 150px; height: 15px; background: red; border: 2px solid white; border-radius: 10px; margin-top: 5px; overflow: hidden; }
    #hp-bar { width: 100%; height: 100%; background: #00ff00; transition: width 0.3s; }
  </style>
</head>
<body>

<!-- Main Menu -->
<div id="mainMenu">
  <h1>Rush Drive 3D</h1>
  <button class="menu-btn" id="playBtn">PLAY</button>
  <button class="menu-btn" id="shopBtn" onclick="alert('Shop is coming soon!')">SHOP</button>
  <button class="menu-btn" id="referBtn" onclick="alert('Refer and Earn is coming soon!')">REFER & EARN</button>
</div>

<!-- Game UI -->
<div id="ui">
  <div id="scoreText">Score: 0</div>
  <div id="coinText">Coins: 0</div>
  <div class="hp-bar-container"><div id="hp-bar"></div></div>
</div>

<canvas id="gameCanvas"></canvas>

<!-- Controls -->
<div class="controls" id="controls">
  <button class="game-btn" id="brake">BRAKE</button>
  <button class="game-btn" id="gas">ACCEL</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== ASSETS (GitHub folder theke) =====
const road1 = new Image(); road1.src = "assets/road1.png";
const playerCar = new Image(); playerCar.src = "assets/car.png";
const enemyImg = new Image(); enemyImg.src = "assets/enemy1.png";
const coinImg = new Image(); coinImg.src = "assets/enemy2.png"; // temporary coin
const policeImg = new Image(); policeImg.src = "assets/police.png"; 

// ===== VARIABLES =====
let roadLeft = canvas.width * 0.15;
let roadRight = canvas.width * 0.85;

let carWidth = 50; let carHeight = 90;
let carX = canvas.width / 2 - carWidth / 2;
let targetX = carX; // Smooth movement er jonno
let carY = canvas.height - 180;

let hp = 100;
let score = 0;
let coinCount = 0;
let isInvincible = false;

let enemies = [];
let coins = [];

let speed = 4;
let maxSpeed = 15;
let accelerating = false;
let braking = false;
let roadY = 0;
let isGameRunning = false;

// Police Chase Variables
let collisionCounter = 0;
let policeActive = false;
let policeTimer = 0;
let policeX = canvas.width / 2;
let policeY = canvas.height + 200;

// ===== GAME LOGIC =====
function resetGame() {
  hp = 100; score = 0; coinCount = 0; speed = 4; collisionCounter = 0;
  enemies = []; coins = []; policeActive = false;
  carX = canvas.width / 2 - carWidth / 2;
  targetX = carX;
  document.getElementById("hp-bar").style.width = "100%";
  document.getElementById("hp-bar").style.background = "#00ff00";
}

function spawnEnemy() {
  enemies.push({ x: Math.random() * ((roadRight - carWidth) - roadLeft) + roadLeft, y: -100 });
}
function spawnCoin() {
  coins.push({ x: Math.random() * ((roadRight - 30) - roadLeft) + roadLeft, y: -50 });
}

function drawShadow(img, x, y, w, h) {
  // 3D effect / Depth er jonno shadow
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetX = 5;
  ctx.shadowOffsetY = 5;
  ctx.drawImage(img, x, y, w, h);
  ctx.shadowColor = 'transparent'; // Reset
}

// ===== GAME LOOP =====
function gameLoop() {
  if (!isGameRunning) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Speed logic
  if (accelerating) { speed += 0.1; if (speed > maxSpeed) speed = maxSpeed; } 
  else if (braking) { speed -= 0.3; if (speed < 2) speed = 2; } 
  else { speed -= 0.05; if (speed < 4) speed = 4; } // Default running speed

  // Road
  roadY += speed;
  if (roadY >= canvas.height) roadY = 0;
  try {
    ctx.drawImage(road1, 0, roadY - canvas.height, canvas.width, canvas.height);
    ctx.drawImage(road1, 0, roadY, canvas.width, canvas.height);
  } catch(e) { /* Ignore if road not loaded yet */ }

  // Side blocks
  ctx.fillStyle = "#222";
  ctx.fillRect(0, 0, roadLeft, canvas.height);
  ctx.fillRect(roadRight, 0, canvas.width - roadRight, canvas.height);

  // Smooth Movement & Boundaries (Lerp logic)
  carX += (targetX - carX) * 0.2; 
  if (carX < roadLeft) carX = roadLeft;
  if (carX + carWidth > roadRight) carX = roadRight - carWidth;

  // Player Draw (Flashing if invincible)
  if (!isInvincible || Math.floor(Date.now() / 100) % 2 === 0) {
    drawShadow(playerCar, carX, carY, carWidth, carHeight);
  }

  // Police Chase Logic
  if (policeActive) {
    policeTimer--;
    policeY += (carY + 120 - policeY) * 0.05; // Smoothly follow player
    policeX += (carX - policeX) * 0.05;
    drawShadow(policeImg, policeX, policeY, carWidth + 10, carHeight + 10); // Police car
    
    // Police leaves after 10 sec (600 frames approx)
    if (policeTimer <= 0) {
      policeY += 5; // Fall back
      if (policeY > canvas.height + 200) policeActive = false;
    }
  }

  // Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    let enemy = enemies[i];
    enemy.y += speed * 0.6; // Enemy moves slightly slower than max speed
    drawShadow(enemyImg, enemy.x, enemy.y, carWidth, carHeight);

    // Collision (Damage 20 HP)
    if (!isInvincible && carX < enemy.x + carWidth && carX + carWidth > enemy.x &&
        carY < enemy.y + carHeight && carY + carHeight > enemy.y) {
        
        hp -= 20;
        document.getElementById("hp-bar").style.width = hp + "%";
        if (hp <= 30) document.getElementById("hp-bar").style.background = "red";
        
        collisionCounter++;
        isInvincible = true;
        setTimeout(() => isInvincible = false, 1500); // 1.5 sec safe time

        // Police Chase Trigger (2 hit)
        if (collisionCounter >= 2 && !policeActive) {
            policeActive = true;
            policeTimer = 600; // 10 seconds at 60fps
            policeY = canvas.height + 100;
            collisionCounter = 0; // Reset counter
        }

        if (hp <= 0) {
            isGameRunning = false;
            alert("Game Over! Score: " + score);
            document.getElementById("mainMenu").style.display = "flex";
            document.getElementById("controls").style.display = "none";
            document.getElementById("ui").style.display = "none";
            return;
        }
    }

    if (enemy.y > canvas.height) { enemies.splice(i, 1); score++; }
  }

  // Coins
  for (let i = coins.length - 1; i >= 0; i--) {
    let coin = coins[i];
    coin.y += speed;
    ctx.drawImage(coinImg, coin.x, coin.y, 30, 30);

    // Collect Coin
    if (carX < coin.x + 30 && carX + carWidth > coin.x &&
        carY < coin.y + 30 && carY + carHeight > coin.y) {
      coins.splice(i, 1);
      coinCount++;
    }
  }

  // Spawn Rates
  if (Math.random() < 0.015) spawnEnemy();
  if (Math.random() < 0.02) spawnCoin();

  // Update UI Text
  document.getElementById("scoreText").innerText = "Score: " + score;
  document.getElementById("coinText").innerText = "Coins: " + coinCount;

  requestAnimationFrame(gameLoop);
}

// ===== CONTROLS =====
const gasBtn = document.getElementById("gas");
const brakeBtn = document.getElementById("brake");

// Button Press Animations & Logic
const startAccel = () => { accelerating = true; gasBtn.classList.add("active"); };
const stopAccel = () => { accelerating = false; gasBtn.classList.remove("active"); };
const startBrake = () => { braking = true; brakeBtn.classList.add("active"); };
const stopBrake = () => { braking = false; brakeBtn.classList.remove("active"); };

gasBtn.addEventListener("touchstart", startAccel);
gasBtn.addEventListener("touchend", stopAccel);
gasBtn.addEventListener("mousedown", startAccel);
gasBtn.addEventListener("mouseup", stopAccel);

brakeBtn.addEventListener("touchstart", startBrake);
brakeBtn.addEventListener("touchend", stopBrake);
brakeBtn.addEventListener("mousedown", startBrake);
brakeBtn.addEventListener("mouseup", stopBrake);

// Smooth Touch/Mouse Movement
canvas.addEventListener("touchmove", (e) => {
  if(!isGameRunning) return;
  targetX = e.touches[0].clientX - carWidth / 2;
});

canvas.addEventListener("mousemove", (e) => {
  if(!isGameRunning) return;
  targetX = e.clientX - carWidth / 2;
});

// ===== MAIN MENU =====
document.getElementById("playBtn").addEventListener("click", () => {
  document.getElementById("mainMenu").style.display = "none";
  document.getElementById("controls").style.display = "flex";
  document.getElementById("ui").style.display = "block";
  resetGame();
  isGameRunning = true;
  gameLoop();
});
</script>
</body>
</html>
