here<!DOCTYPE html>
<html>
<head>
  <title>Rush Drive 3D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; overflow: hidden; background: black; }

    canvas { display: block; }

    /* Buttons */
    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: space-around;
    }

    button {
      width: 120px;
      height: 60px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
    }

    #gas { background: green; color: white; }
    #brake { background: red; color: white; }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="controls">
  <button id="gas">ACCEL</button>
  <button id="brake">BRAKE</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== LOAD IMAGES =====
const road1 = new Image(); road1.src = "assets/road1.png";
const playerCar = new Image(); playerCar.src = "assets/car.png";
const enemyImg = new Image(); enemyImg.src = "assets/enemy1.png";
const coinImg = new Image(); coinImg.src = "assets/enemy2.png"; // temp coin

let currentRoad = road1;

// ===== ROAD LIMIT =====
let roadLeft = canvas.width * 0.2;
let roadRight = canvas.width * 0.8;

// ===== PLAYER =====
let carWidth = 50;
let carHeight = 100;

// 🔥 camera নিচে (player নিচে নামানো)
let carX = canvas.width / 2 - carWidth / 2;
let carY = canvas.height - 200;

// ===== GAME STATE =====
let enemies = [];
let coins = [];

let roadY = 0;
let speed = 3;
let maxSpeed = 12;

let accelerating = false;
let braking = false;

let score = 0;
let coinCount = 0;

// ===== SPAWN =====
function spawnEnemy() {
  enemies.push({
    x: Math.random() * (roadRight - roadLeft) + roadLeft,
    y: -100
  });
}

function spawnCoin() {
  coins.push({
    x: Math.random() * (roadRight - roadLeft) + roadLeft,
    y: -50
  });
}

// ===== GAME LOOP =====
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // SPEED CONTROL
  if (accelerating) {
    speed += 0.1;
    if (speed > maxSpeed) speed = maxSpeed;
  } else if (braking) {
    speed -= 0.2;
    if (speed < 2) speed = 2;
  } else {
    speed -= 0.05;
    if (speed < 3) speed = 3;
  }

  // ROAD
  roadY += speed;
  if (roadY >= canvas.height) roadY = 0;

  ctx.drawImage(currentRoad, 0, roadY - canvas.height, canvas.width, canvas.height);
  ctx.drawImage(currentRoad, 0, roadY, canvas.width, canvas.height);

  // SIDE BLOCK
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, roadLeft, canvas.height);
  ctx.fillRect(roadRight, 0, canvas.width - roadRight, canvas.height);

  // PLAYER
  ctx.drawImage(playerCar, carX, carY, carWidth, carHeight);

  // ENEMY
  enemies.forEach((enemy, i) => {
    enemy.y += speed;
    ctx.drawImage(enemyImg, enemy.x, enemy.y, carWidth, carHeight);

    // COLLISION
    if (
      carX < enemy.x + carWidth &&
      carX + carWidth > enemy.x &&
      carY < enemy.y + carHeight &&
      carY + carHeight > enemy.y
    ) {
      alert("Game Over!");
      location.reload();
    }

    if (enemy.y > canvas.height) {
      enemies.splice(i, 1);
      score++;
    }
  });

  // COIN
  coins.forEach((coin, i) => {
    coin.y += speed;
    ctx.drawImage(coinImg, coin.x, coin.y, 30, 30);

    // COLLECT
    if (
      carX < coin.x + 30 &&
      carX + carWidth > coin.x &&
      carY < coin.y + 30 &&
      carY + carHeight > coin.y
    ) {
      coins.splice(i, 1);
      coinCount++;
    }
  });

  // SPAWN RATE
  if (Math.random() < 0.02) spawnEnemy();
  if (Math.random() < 0.015) spawnCoin();

  // UI
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 20, 40);
  ctx.fillText("Coins: " + coinCount, 20, 70);
  ctx.fillText("Speed: " + Math.floor(speed * 20) + " km/h", 20, 100);

  requestAnimationFrame(gameLoop);
}

// ===== BUTTON CONTROL =====
const gasBtn = document.getElementById("gas");
const brakeBtn = document.getElementById("brake");

gasBtn.onmousedown = () => accelerating = true;
gasBtn.onmouseup = () => accelerating = false;

brakeBtn.onmousedown = () => braking = true;
brakeBtn.onmouseup = () => braking = false;

// MOBILE
gasBtn.ontouchstart = () => accelerating = true;
gasBtn.ontouchend = () => accelerating = false;

brakeBtn.ontouchstart = () => braking = true;
brakeBtn.ontouchend = () => braking = false;

// MOVE LEFT RIGHT
document.addEventListener("mousemove", (e) => {
  carX = e.clientX - carWidth / 2;

  if (carX < roadLeft) carX = roadLeft;
  if (carX + carWidth > roadRight) carX = roadRight - carWidth;
});

gameLoop();
</script>

</body>
</html>
